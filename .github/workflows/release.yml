name: Release

on:
  workflow_run:
    workflows: ["Test"]
    types: [completed]

permissions:
  contents: write
  packages: write

jobs:
  check:
    name: Check Tag
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Extract tag
        id: tag
        run: echo "tag=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"

  build-image:
    name: Build Docker (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: [check]
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.check.outputs.tag }}

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.check.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.check.outputs.tag }}
            type=semver,pattern={{major}},value=${{ needs.check.outputs.tag }}
          flavor: |
            suffix=-${{ matrix.arch }},onlatest=true

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          build-args: |
            VERSION=${{ needs.check.outputs.tag }}

  merge-manifests:
    name: Merge Docker Manifests
    runs-on: ubuntu-latest
    needs: [check, build-image]
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.check.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.check.outputs.tag }}
            type=semver,pattern={{major}},value=${{ needs.check.outputs.tag }}

      - name: Create and push multi-arch manifest
        run: |
          echo "${{ steps.meta.outputs.tags }}" | while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "Creating manifest for: ${tag}"
            docker buildx imagetools create -t "${tag}" \
              "${tag}-amd64" \
              "${tag}-arm64" || exit 1
          done

  build-binaries:
    name: Build Binary (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: [check]
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.check.outputs.tag }}

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: server/go.sum

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install SQLite toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc sqlite3 libsqlite3-dev

      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@latest

      - name: Install dependencies
        run: make setup

      - name: Build single binary
        run: make build-all
        env:
          VITE_APP_VERSION: ${{ needs.check.outputs.tag }}

      - name: Package binary
        run: |
          mkdir -p dist
          tar -czf "dist/bonds-server-linux-${{ matrix.arch }}.tar.gz" \
            -C server/bin bonds-server

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bonds-server-linux-${{ matrix.arch }}
          path: dist/*.tar.gz
          if-no-files-found: error

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [check, merge-manifests, build-binaries]
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.check.outputs.tag }}

      - name: Download binaries
        uses: actions/download-artifact@v8
        with:
          pattern: bonds-server-linux-*
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.check.outputs.tag }}
          generate_release_notes: true
          files: dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
